name: Auto Update News

on:
  schedule:
    # Запускаем каждые 4 часа
    - cron: '0 */4 * * *'
  workflow_dispatch:  # Можно запустить вручную

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Fetch news from RSS
        run: python scripts/fetch_news.py
      
      - name: Check Groq API key
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "ERROR: GROQ_API_KEY is empty!"
            exit 1
          fi
          echo "Key length: ${#GROQ_API_KEY}"
          echo "Key starts with: ${GROQ_API_KEY:0:5}..."
          # Test the API
          RESPONSE=$(curl -s https://api.groq.com/openai/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -d '{"model":"llama-3.1-8b-instant","messages":[{"role":"user","content":"Say hello"}],"max_tokens":10}')
          echo "Test response: $RESPONSE"
          if echo "$RESPONSE" | grep -q "error"; then
            echo "ERROR: Groq API test failed!"
            exit 1
          fi
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      
      - name: Rewrite articles with AI
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/rewrite_news.py
      
      - name: Generate HTML pages
        run: python scripts/generate.py
      
      - name: Commit and push changes
        run: |
          git config --global user.name 'MotoBreaking Bot'
          git config --global user.email 'bot@motobreaking.com'
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update news $(date '+%Y-%m-%d %H:%M')"
          git push
